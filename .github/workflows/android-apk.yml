name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/android-apk.yml'
      - 'android/**'
      - 'capacitor.config.json'
      - 'scripts/prepare-android-ci.mjs'
      - 'www/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Prepare Android assets
        run: node scripts/prepare-android-ci.mjs

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make Gradle executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VocabQuest-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK ready
        run: |
          echo "APK built successfully."
          ls -lh android/app/build/outputs/apk/debug/
