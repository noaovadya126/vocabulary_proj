name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/android-apk.yml'
      - 'android/**'
      - 'capacitor.config.json'
      - 'www/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/prepare-android-ci.mjs'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container:
      image: mingc/android-build-box:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Android assets
        run: node scripts/prepare-android-ci.mjs

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VocabQuest-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: APK ready
        run: ls -lh android/app/build/outputs/apk/debug/
